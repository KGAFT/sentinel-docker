services:
  # ---------------------------------------------------------------------------
  # hbbs: RustDesk ID / rendezvous server (registration + hole punching).
  # ---------------------------------------------------------------------------
  hbbs:
    image: rustdesk/rustdesk-server:latest
    container_name: rustdesk-hbbs
    command: hbbs -r ${RUSTDESK_SERVER_HOST}:21117
    ports:
      - "21115:21115"        # NAT type test (tcp)
      - "21116:21116"        # ID registration / hole punch (tcp)
      - "21116:21116/udp"    # ID registration / hole punch (udp)
      - "21118:21118"        # web client (tcp)
    volumes:
      - ./server/data:/root
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # hbbr: RustDesk relay server (used when a direct P2P link can't be made).
  # ---------------------------------------------------------------------------
  hbbr:
    image: rustdesk/rustdesk-server:latest
    container_name: rustdesk-hbbr
    command: hbbr
    ports:
      - "21117:21117"        # relay (tcp)
      - "21119:21119"        # web client relay (tcp)
    volumes:
      - ./server/data:/root
    restart: unless-stopped
